services:
  api:
    image: python:3.14-slim
    working_dir: /workspace
    command: sh -c "pip install -e ./backend[dev] && python -m uvicorn backend.app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./:/workspace
    environment:
      MOSS_ENVIRONMENT: development
      MOSS_POSTGRES_DSN: postgresql://moss:moss@postgres:5432/moss
      MOSS_REDIS_DSN: redis://redis:6379/0
      MOSS_DUCKDB_PATH: data/moss.duckdb
      MOSS_MINIO_ENDPOINT: minio:9000
      MOSS_MINIO_ACCESS_KEY: minioadmin
      MOSS_MINIO_SECRET_KEY: minioadmin
      MOSS_MINIO_BUCKET: moss-artifacts
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    image: python:3.14-slim
    working_dir: /workspace
    command: sh -c "pip install -e ./backend[dev] && python -m dramatiq backend.app.tasks.ingest backend.app.tasks.materialize"
    volumes:
      - ./:/workspace
    environment:
      MOSS_ENVIRONMENT: development
      MOSS_POSTGRES_DSN: postgresql://moss:moss@postgres:5432/moss
      MOSS_REDIS_DSN: redis://redis:6379/0
      MOSS_DUCKDB_PATH: data/moss.duckdb
      MOSS_MINIO_ENDPOINT: minio:9000
      MOSS_MINIO_ACCESS_KEY: minioadmin
      MOSS_MINIO_SECRET_KEY: minioadmin
      MOSS_MINIO_BUCKET: moss-artifacts
    depends_on:
      - postgres
      - redis
      - minio

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: moss
      POSTGRES_USER: moss
      POSTGRES_PASSWORD: moss
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"

  frontend:
    image: node:22-alpine
    working_dir: /workspace/frontend
    command: sh -c "if [ -f package.json ]; then npm run dev -- --host 0.0.0.0 --port 5173; else sleep infinity; fi"
    volumes:
      - ./:/workspace
    ports:
      - "5173:5173"
    depends_on:
      - api
