openapi: 3.1.0
info:
  title: Bond Analysis Trading Platform API
  version: 1.0.0
  summary: Frontend contract for bond lookup, portfolio analytics, market data, and order workflows.
  description: >
    OpenAPI contract for the standalone bond-analysis frontend foundation.
    REST endpoints are defined under paths. Realtime market streams are described
    in the custom `x-websocket-streams` extension because OpenAPI does not model
    WebSocket channels natively.
servers:
  - url: https://api.example.com
    description: Production example
  - url: http://localhost:8000
    description: Local development
tags:
  - name: Bonds
  - name: Portfolio
  - name: Market
  - name: Orders
paths:
  /api/bonds:
    get:
      tags: [Bonds]
      summary: List bonds
      description: Returns a paginated bond list for tables, watchlists, and landing screens.
      parameters:
        - $ref: '#/components/parameters/query'
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - name: sortBy
          in: query
          schema:
            type: string
            enum:
              - cleanPrice
              - yieldToMaturity
              - creditSpreadBp
              - modifiedDuration
              - convexity
              - tradeVolume
              - liquidityRating
              - rating
              - maturityDate
              - issuerName
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: ratings
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/BondRating'
        - name: issuerTypes
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/IssuerType'
        - name: markets
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/BondMarket'
        - name: maturityDateFrom
          in: query
          schema:
            type: string
            format: date
        - name: maturityDateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Paginated bond list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBondResponse'
              examples:
                default:
                  value:
                    items:
                      - $ref: '#/components/examples/BondExample'
                    total: 1
                    page: 1
                    pageSize: 20
                    hasNextPage: false
        '429':
          $ref: '#/components/responses/RateLimitError'
  /api/bonds/search:
    post:
      tags: [Bonds]
      summary: Advanced bond search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BondSearchRequest'
            examples:
              default:
                value:
                  query: policy bank
                  ratings: [AAA]
                  yieldRange:
                    min: 2.0
                    max: 2.6
                  durationRange:
                    min: 4.0
                    max: 7.0
                  tags: [policy-bank, liquid]
                  page: 1
                  pageSize: 50
      responses:
        '200':
          description: Paginated search result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedBondResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
  /api/bonds/{bondId}:
    get:
      tags: [Bonds]
      summary: Get bond detail
      parameters:
        - $ref: '#/components/parameters/bondId'
      responses:
        '200':
          description: Full bond detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bond'
              examples:
                default:
                  value:
                    $ref: '#/components/examples/BondExample'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /api/bonds/{bondId}/price-history:
    get:
      tags: [Market]
      summary: Get bond price history
      parameters:
        - $ref: '#/components/parameters/bondId'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/interval'
      responses:
        '200':
          description: Historical price series
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TimeSeriesPoint'
              examples:
                default:
                  value:
                    - date: '2026-04-19'
                      value: 100.82
                    - date: '2026-04-20'
                      value: 101.01
                    - date: '2026-04-21'
                      value: 101.24
  /api/bonds/{bondId}/yield-history:
    get:
      tags: [Market]
      summary: Get bond yield history
      parameters:
        - $ref: '#/components/parameters/bondId'
        - $ref: '#/components/parameters/from'
        - $ref: '#/components/parameters/to'
        - $ref: '#/components/parameters/interval'
      responses:
        '200':
          description: Historical yield series
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TimeSeriesPoint'
              examples:
                default:
                  value:
                    - date: '2026-04-19'
                      value: 2.18
                    - date: '2026-04-20'
                      value: 2.15
                    - date: '2026-04-21'
                      value: 2.12
  /api/portfolio:
    get:
      tags: [Portfolio]
      summary: List portfolios
      responses:
        '200':
          description: Paginated portfolio list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPortfolioResponse'
  /api/portfolio/create:
    post:
      tags: [Portfolio]
      summary: Create portfolio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortfolioCreateRequest'
      responses:
        '201':
          description: Created portfolio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Portfolio'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/portfolio/{portfolioId}:
    get:
      tags: [Portfolio]
      summary: Get portfolio detail
      parameters:
        - $ref: '#/components/parameters/portfolioId'
      responses:
        '200':
          description: Portfolio detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Portfolio'
        '404':
          $ref: '#/components/responses/NotFoundError'
    put:
      tags: [Portfolio]
      summary: Update portfolio
      parameters:
        - $ref: '#/components/parameters/portfolioId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortfolioUpdateRequest'
      responses:
        '200':
          description: Updated portfolio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Portfolio'
        '409':
          description: Version conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/portfolio/{portfolioId}/analytics:
    get:
      tags: [Portfolio]
      summary: Get portfolio analytics
      parameters:
        - $ref: '#/components/parameters/portfolioId'
        - name: asOfDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Portfolio analytics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PortfolioAnalytics'
  /api/market/yield-curve:
    get:
      tags: [Market]
      summary: Get yield curve
      parameters:
        - name: curveId
          in: query
          schema:
            type: string
        - name: asOfDate
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Yield curve
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YieldCurve'
  /api/market/indices:
    get:
      tags: [Market]
      summary: Get market indices
      parameters:
        - name: asOfDate
          in: query
          schema:
            type: string
            format: date
        - name: indexTypes
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Market index snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MarketIndexSnapshot'
  /api/orders:
    get:
      tags: [Orders]
      summary: List orders
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - name: bondCode
          in: query
          schema:
            type: string
        - name: side
          in: query
          schema:
            $ref: '#/components/schemas/TradeSide'
        - name: status
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/OrderStatus'
      responses:
        '200':
          description: Paginated order list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedOrderResponse'
    post:
      tags: [Orders]
      summary: Create order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
            examples:
              default:
                value:
                  bondCode: '240210'
                  side: BUY
                  quantity: 1000000
                  price: 101.25
                  feeAmount: 1250
                  orderType: LIMIT
                  traderId: TRADER-01
      responses:
        '201':
          description: Created order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '422':
          $ref: '#/components/responses/ValidationError'
  /api/orders/{orderId}:
    get:
      tags: [Orders]
      summary: Get order detail
      parameters:
        - $ref: '#/components/parameters/orderId'
      responses:
        '200':
          description: Order detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          $ref: '#/components/responses/NotFoundError'
    delete:
      tags: [Orders]
      summary: Cancel order
      parameters:
        - $ref: '#/components/parameters/orderId'
      responses:
        '200':
          description: Cancelled order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '409':
          description: Order already in final state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  parameters:
    bondId:
      name: bondId
      in: path
      required: true
      schema:
        type: string
    portfolioId:
      name: portfolioId
      in: path
      required: true
      schema:
        type: string
    orderId:
      name: orderId
      in: path
      required: true
      schema:
        type: string
    query:
      name: query
      in: query
      schema:
        type: string
    page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    pageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    from:
      name: from
      in: query
      schema:
        type: string
        format: date
    to:
      name: to
      in: query
      schema:
        type: string
        format: date
    interval:
      name: interval
      in: query
      schema:
        type: string
        enum: [1D, 1W, 1M]
  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Invalid request payload
            code: VALIDATION_ERROR
            traceId: tr_validation
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Resource not found
            code: NOT_FOUND
            traceId: tr_not_found
    RateLimitError:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Too many requests
            code: RATE_LIMIT
            traceId: tr_limit
  schemas:
    ErrorResponse:
      type: object
      required: [message, code, traceId]
      properties:
        message:
          type: string
        code:
          type: string
        traceId:
          type: string
    BondMarket:
      type: string
      enum: [CIBM, SSE, SZSE, OTC, HKEX]
    IssuerType:
      type: string
      enum:
        - sovereign
        - policy_bank
        - local_government
        - commercial_bank
        - corporate
        - asset_backed
        - other
    BondRating:
      type: string
      enum:
        - AAA
        - AA+
        - AA
        - AA-
        - A+
        - A
        - A-
        - BBB+
        - BBB
        - BBB-
        - BB+
        - BB
        - B
        - CCC
        - CC
        - C
        - D
        - NR
    LiquidityRating:
      type: string
      enum: [L1, L2, L3, L4]
    CouponType:
      type: string
      enum: [fixed, floating, zero_coupon, step_up, other]
    DataQualityMeta:
      type: object
      required: [asOfDate, source, freshness, isStale]
      properties:
        asOfDate:
          type: string
          format: date
        source:
          type: string
        freshness:
          type: string
          enum: [live, delayed, stale, fallback]
        isStale:
          type: boolean
        fallbackDate:
          type: string
          format: date
        lastUpdatedAt:
          type: string
          format: date-time
        traceId:
          type: string
        note:
          type: string
    BondMarketData:
      type: object
      required: [cleanPrice, yieldToMaturity, yieldChangeBp, priceChangePct, dataQuality]
      properties:
        cleanPrice:
          type: number
        dirtyPrice:
          type: number
        yieldToMaturity:
          type: number
        yieldChangeBp:
          type: number
        priceChangePct:
          type: number
        tradeVolume:
          type: number
        tradeAmount:
          type: number
        bidPrice:
          type: number
        askPrice:
          type: number
        midPrice:
          type: number
        quoteTime:
          type: string
          format: date-time
        dataQuality:
          $ref: '#/components/schemas/DataQualityMeta'
    BondRiskMetrics:
      type: object
      required: [rating, modifiedDuration, liquidityRating, riskScore]
      properties:
        rating:
          $ref: '#/components/schemas/BondRating'
        internalRating:
          type: string
        modifiedDuration:
          type: number
        macaulayDuration:
          type: number
        convexity:
          type: number
        dv01:
          type: number
        creditSpreadBp:
          type: number
        zSpreadBp:
          type: number
        optionAdjustedSpreadBp:
          type: number
        liquidityRating:
          $ref: '#/components/schemas/LiquidityRating'
        riskScore:
          type: number
    TimeSeriesPoint:
      type: object
      required: [date, value]
      properties:
        date:
          type: string
          format: date
        value:
          type: number
        change:
          type: number
        label:
          type: string
    BondRatingHistoryEvent:
      type: object
      required: [effectiveDate, agency, newRating]
      properties:
        effectiveDate:
          type: string
          format: date
        agency:
          type: string
        previousRating:
          $ref: '#/components/schemas/BondRating'
        newRating:
          $ref: '#/components/schemas/BondRating'
        outlook:
          type: string
        note:
          type: string
    BondHistoricalSeries:
      type: object
      required: [priceHistory, yieldHistory, ratingHistory]
      properties:
        priceHistory:
          type: array
          items:
            $ref: '#/components/schemas/TimeSeriesPoint'
        yieldHistory:
          type: array
          items:
            $ref: '#/components/schemas/TimeSeriesPoint'
        spreadHistory:
          type: array
          items:
            $ref: '#/components/schemas/TimeSeriesPoint'
        ratingHistory:
          type: array
          items:
            $ref: '#/components/schemas/BondRatingHistoryEvent'
    Bond:
      type: object
      required:
        - bondId
        - bondCode
        - market
        - shortName
        - issuerId
        - issuerName
        - issuerType
        - currency
        - couponType
        - issueDate
        - maturityDate
        - marketData
        - riskMetrics
        - history
      properties:
        bondId:
          type: string
        bondCode:
          type: string
        isin:
          type: string
        market:
          $ref: '#/components/schemas/BondMarket'
        shortName:
          type: string
        fullName:
          type: string
        issuerId:
          type: string
        issuerName:
          type: string
        issuerType:
          $ref: '#/components/schemas/IssuerType'
        currency:
          type: string
        couponType:
          $ref: '#/components/schemas/CouponType'
        couponRate:
          type: number
        issueDate:
          type: string
          format: date
        maturityDate:
          type: string
          format: date
        paymentFrequency:
          type: string
        sector:
          type: string
        tags:
          type: array
          items:
            type: string
        marketData:
          $ref: '#/components/schemas/BondMarketData'
        riskMetrics:
          $ref: '#/components/schemas/BondRiskMetrics'
        history:
          $ref: '#/components/schemas/BondHistoricalSeries'
    RangeFilter:
      type: object
      properties:
        min:
          type: number
        max:
          type: number
    BondSearchRequest:
      type: object
      properties:
        query:
          type: string
        page:
          type: integer
        pageSize:
          type: integer
        sortBy:
          type: string
        sortOrder:
          type: string
          enum: [asc, desc]
        ratings:
          type: array
          items:
            $ref: '#/components/schemas/BondRating'
        issuerTypes:
          type: array
          items:
            $ref: '#/components/schemas/IssuerType'
        markets:
          type: array
          items:
            $ref: '#/components/schemas/BondMarket'
        maturityDateFrom:
          type: string
          format: date
        maturityDateTo:
          type: string
          format: date
        yieldRange:
          $ref: '#/components/schemas/RangeFilter'
        durationRange:
          $ref: '#/components/schemas/RangeFilter'
        liquidityRatings:
          type: array
          items:
            $ref: '#/components/schemas/LiquidityRating'
        sectors:
          type: array
          items:
            type: string
        tags:
          type: array
          items:
            type: string
    PaginatedBondResponse:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Bond'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
        hasNextPage:
          type: boolean
    PortfolioHolding:
      type: object
      required: [positionId, bond, weight, holdingCost, marketValue, unrealizedPnl, contributionYield]
      properties:
        positionId:
          type: string
        bond:
          $ref: '#/components/schemas/Bond'
        weight:
          type: number
        faceValue:
          type: number
        quantity:
          type: number
        holdingCost:
          type: number
        marketValue:
          type: number
        unrealizedPnl:
          type: number
        realizedPnl:
          type: number
        contributionYield:
          type: number
    PortfolioStatistics:
      type: object
      required: [averageYield, weightedDuration, concentrationRatio, riskScore]
      properties:
        averageYield:
          type: number
        weightedDuration:
          type: number
        concentrationRatio:
          type: number
        riskScore:
          type: number
        dailyPnl:
          type: number
        monthlyPnl:
          type: number
        trackingError:
          type: number
    CurveExposurePoint:
      type: object
      required: [tenor, weight]
      properties:
        tenor:
          type: string
        weight:
          type: number
    BucketExposurePoint:
      type: object
      required: [bucket, weight]
      properties:
        bucket:
          type: string
        weight:
          type: number
    IssuerExposurePoint:
      type: object
      required: [issuerName, weight]
      properties:
        issuerName:
          type: string
        weight:
          type: number
    StressTestResult:
      type: object
      required: [scenarioId, scenarioName, estimatedPnl]
      properties:
        scenarioId:
          type: string
        scenarioName:
          type: string
        estimatedPnl:
          type: number
        estimatedReturnBp:
          type: number
        note:
          type: string
    PortfolioAnalytics:
      type: object
      required: [asOfDate, curveExposure, ratingExposure, issuerExposure, stressTests]
      properties:
        asOfDate:
          type: string
          format: date
        curveExposure:
          type: array
          items:
            $ref: '#/components/schemas/CurveExposurePoint'
        ratingExposure:
          type: array
          items:
            $ref: '#/components/schemas/BucketExposurePoint'
        issuerExposure:
          type: array
          items:
            $ref: '#/components/schemas/IssuerExposurePoint'
        stressTests:
          type: array
          items:
            $ref: '#/components/schemas/StressTestResult'
        dataQuality:
          $ref: '#/components/schemas/DataQualityMeta'
    Portfolio:
      type: object
      required:
        - portfolioId
        - portfolioName
        - createdAt
        - totalMarketValue
        - statistics
        - holdings
      properties:
        portfolioId:
          type: string
        portfolioName:
          type: string
        createdAt:
          type: string
          format: date-time
        managerName:
          type: string
        benchmark:
          type: string
        baseCurrency:
          type: string
        totalMarketValue:
          type: number
        cashBalance:
          type: number
        statistics:
          $ref: '#/components/schemas/PortfolioStatistics'
        holdings:
          type: array
          items:
            $ref: '#/components/schemas/PortfolioHolding'
        analytics:
          $ref: '#/components/schemas/PortfolioAnalytics'
        dataQuality:
          $ref: '#/components/schemas/DataQualityMeta'
    PortfolioCreateRequest:
      type: object
      required: [portfolioName]
      properties:
        portfolioName:
          type: string
        benchmark:
          type: string
        baseCurrency:
          type: string
        managerName:
          type: string
        holdingBondIds:
          type: array
          items:
            type: string
    PortfolioUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/PortfolioCreateRequest'
    PaginatedPortfolioResponse:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Portfolio'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
    YieldCurvePoint:
      type: object
      required: [tenor, yieldValue]
      properties:
        tenor:
          type: string
        yieldValue:
          type: number
        changeBp:
          type: number
    YieldCurve:
      type: object
      required: [curveId, curveName, asOfDate, points]
      properties:
        curveId:
          type: string
        curveName:
          type: string
        asOfDate:
          type: string
          format: date
        points:
          type: array
          items:
            $ref: '#/components/schemas/YieldCurvePoint'
        dataQuality:
          $ref: '#/components/schemas/DataQualityMeta'
    MarketIndex:
      type: object
      required: [indexId, indexName, indexType, currentValue, asOfDate]
      properties:
        indexId:
          type: string
        indexName:
          type: string
        indexType:
          type: string
        currentValue:
          type: number
        changePct:
          type: number
        changeBp:
          type: number
        asOfDate:
          type: string
          format: date
    MarketIndexSnapshot:
      type: object
      required: [asOfDate, indices]
      properties:
        asOfDate:
          type: string
          format: date
        indices:
          type: array
          items:
            $ref: '#/components/schemas/MarketIndex'
        dataQuality:
          $ref: '#/components/schemas/DataQualityMeta'
    TradeSide:
      type: string
      enum: [BUY, SELL]
    OrderType:
      type: string
      enum: [LIMIT, MARKET, RFQ]
    OrderStatus:
      type: string
      enum: [PENDING, PARTIALLY_FILLED, FILLED, CANCELLED, REJECTED]
    OrderExecution:
      type: object
      required: [executionId, executedQuantity, executedPrice, executedAt]
      properties:
