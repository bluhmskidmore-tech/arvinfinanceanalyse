name: CI

on:
  push:
    branches: [master, "codex/**"]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        run: pip install -e "./backend[dev]"

      - name: Run bounded backend release suite
        run: python scripts/backend_release_suite.py --governance-audit-output governance-lineage-audit.json

      - name: Upload governance lineage audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-lineage-audit
          path: governance-lineage-audit.json

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run Vitest
        run: npx vitest run

  lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Surface naming lint
        working-directory: .
        run: node scripts/check_surface_naming.mjs

      - name: ESLint
        run: npx eslint .
