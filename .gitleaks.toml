[extend]
useDefault = true

[[allowlists]]
description = "Generated repo snapshots and local artifact directories"
paths = [
  '''^audit_pack/source_snapshot/''',
  '''^\.codex-pr-logs/''',
  '''^\.playwright-mcp/''',
  '''^test_output/''',
  '''^tmp/''',
  '''^tmp-governance/''',
]

[[allowlists]]
description = "Dependency caches and local virtual environments"
paths = [
  '''^node_modules/''',
  '''^frontend/node_modules/''',
  '''^\.venv/''',
  '''^backend/\.venv/''',
  '''^\.pytest_cache/''',
  '''^\.mypy_cache/''',
  '''^\.ruff_cache/''',
]

[[allowlists]]
description = "Business identifier fields named key are not credentials"
regexTarget = "match"
regexes = [
  '''(?i)(^|[^A-Za-z0-9_])["']?(key|kpiKey|decisionKey|decision_key|component_key)["']?\s*(:|={1,3})\s*["'][A-Za-z0-9._:/-]+["']''',
]

[[allowlists]]
description = "TypeScript Api-prefixed type aliases are not credentials"
regexTarget = "match"
regexes = [
  '''ApiDV01[A-Za-z0-9_]+''',
]
